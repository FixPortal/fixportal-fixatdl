name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  pack-and-release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      # Restoring the private FixPortal.CodeStyle package needs read:packages.
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FixPortal.FixAtdl.sln

      - name: Build (Release)
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          dotnet build FixPortal.FixAtdl.sln -c Release --no-restore /p:Version=$VERSION

      - name: Test (Release)
        run: dotnet test FixPortal.FixAtdl.sln -c Release --no-build

      - name: Pack
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          dotnet pack src/FixPortal.FixAtdl/FixPortal.FixAtdl.csproj -c Release --no-build -o artifacts /p:Version=$VERSION

      - name: Upload nupkg artefact
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: artifacts/*.nupkg

      # github.token suffices here: packages:write lets it publish to this repo's own
      # namespace (the cross-repo 403 trap only applies to *consumers* restoring it).
      - name: Push to GitHub Packages
        run: dotnet nuget push artifacts/*.nupkg --source https://nuget.pkg.github.com/FixPortal/index.json --api-key ${{ github.token }}

      - name: Create GitHub Release
        run: gh release create "$RELEASE_TAG" artifacts/*.nupkg --generate-notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
