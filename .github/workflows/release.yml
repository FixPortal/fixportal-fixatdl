name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  pack-and-release:
    name: Publish Package (GitHub NuGet)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    env:
      # Restoring the private FixPortal.CodeStyle package needs read:packages.
      GITHUB_PACKAGES_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up .NET 10
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FixPortal.FixAtdl.slnx

      - name: Build (Release)
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION=${REF_NAME#v}
          dotnet build FixPortal.FixAtdl.slnx -c Release --no-restore /p:Version="${VERSION}"

      - name: Test (Release)
        run: dotnet test FixPortal.FixAtdl.slnx -c Release --no-build

      - name: Pack
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION=${REF_NAME#v}
          dotnet pack src/FixPortal.FixAtdl/FixPortal.FixAtdl.csproj -c Release --no-build -o artifacts /p:Version="${VERSION}"

      - name: Upload nupkg artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nupkg
          path: artifacts/*.nupkg

      # github.token suffices here: packages:write lets it publish to this repo's own
      # namespace (the cross-repo 403 trap only applies to *consumers* restoring it).
      - name: Push to GitHub Packages
        run: dotnet nuget push artifacts/*.nupkg --source https://nuget.pkg.github.com/FixPortal/index.json --api-key ${{ github.token }} --skip-duplicate

      - name: Create GitHub Release
        run: gh release create "$RELEASE_TAG" artifacts/*.nupkg --generate-notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
