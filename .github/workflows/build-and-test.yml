name: build-and-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FixPortal.FixAtdl.sln

      - name: Build
        run: dotnet build FixPortal.FixAtdl.sln -c Release --no-restore

      - name: Test
        run: dotnet test FixPortal.FixAtdl.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --ignore-failed-sources

      - name: Generate coverage summary
        run: reportgenerator -reports:**/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:TextSummary

      - name: Check coverage floor
        shell: pwsh
        run: |
          $summary = Get-Content coverage-report/Summary.txt -Raw
          if ($summary -match 'Line coverage:\s+([\d.]+)%') {
            $line = [double]$Matches[1]
            Write-Host "Line coverage: $line%"
            if ($line -lt 65.0) {
              Write-Host "::error::Line coverage $line% is below the 65% floor"
              exit 1
            }
          } else {
            Write-Host "::error::Could not parse line coverage from summary"
            exit 1
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
