name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      # Restoring the private FixPortal.CodeStyle package needs read:packages.
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Lint workflow and shell scripts
        uses: raven-actions/actionlint@v2
        with:
          shellcheck: true

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FixPortal.FixAtdl.slnx

      - name: Build
        run: dotnet build FixPortal.FixAtdl.slnx -c Release --no-restore

      - name: Test
        run: dotnet test FixPortal.FixAtdl.slnx -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/*.trx'
