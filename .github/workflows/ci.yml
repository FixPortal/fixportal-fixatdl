name: ci

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: false
        default: fixportal-dev
        type: choice
        options:
          - fixportal-dev
          - fixportal-prod

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Lint workflow and shell scripts
        uses: raven-actions/actionlint@v2
        with:
          shellcheck: true

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FixPortal.FixAtdl.slnx

      - name: Build
        run: dotnet build FixPortal.FixAtdl.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FixPortal.FixAtdl.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/*.trx
          if-no-files-found: ignore
