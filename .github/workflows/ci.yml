name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      # Restoring the private FixPortal.CodeStyle package needs read:packages.
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Check GITHUB_PACKAGES_TOKEN
        run: |
          if [ -z "$GITHUB_PACKAGES_TOKEN" ]; then
            echo "::error::GH_PACKAGES_TOKEN secret is not set. This token is required to restore the private FixPortal.CodeStyle package."
            exit 1
          fi

      - name: Lint workflow and shell scripts
        uses: raven-actions/actionlint@v2
        with:
          shellcheck: true

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FixPortal.FixAtdl.slnx

      - name: Build
        run: dotnet build FixPortal.FixAtdl.slnx -c Release --no-restore

      - name: Test
        run: dotnet test FixPortal.FixAtdl.slnx -c Release --no-build --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Restore local tools
        run: dotnet tool restore

      - name: Generate coverage summary
        run: dotnet reportgenerator -reports:**/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:TextSummary

      - name: Check coverage floor
        shell: pwsh
        run: |
          $summary = Get-Content coverage-report/Summary.txt -Raw
          if ($summary -match 'Line coverage:\s+([\d.]+)%') {
            $line = [double]$Matches[1]
            Write-Host "Line coverage: $line%"
            if ($line -lt 65.0) {
              Write-Host "::error::Line coverage $line% is below the 65% floor"
              exit 1
            }
          } else {
            Write-Host "::error::Could not parse line coverage from summary"
            exit 1
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/*.trx'
