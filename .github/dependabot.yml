version: 2

updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      aspnetcore:
        patterns:
          - "Microsoft.AspNetCore.*"
      ef-core:
        patterns:
          - "Microsoft.EntityFrameworkCore"
          - "Microsoft.EntityFrameworkCore.*"
      xunit:
        patterns:
          - "xunit"
          - "xunit.*"
          - "xunit.v3"
          - "xunit.v3.*"
      testing:
        patterns:
          - "NSubstitute"
          - "NSubstitute.*"
          - "AwesomeAssertions"
          - "AwesomeAssertions.*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"
      nodatime:
        patterns:
          - "NodaTime"
          - "NodaTime.*"
      serilog:
        patterns:
          - "Serilog"
          - "Serilog.*"
      azure-sdk:
        patterns:
          - "Azure.*"
          - "Microsoft.Azure.*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns:
          - "*"
